# ============================================================
# Docker Egress Proxy - Squid 설정
# 용도: Docker 컨테이너가 호스트 IP로 외부 API에 접근하도록 프록시
# ============================================================

# --- 포트 ---
http_port 3128

# --- ACL 정의 ---
# Docker Desktop (macOS) 기본 네트워크 대역
acl docker_bridge src 172.17.0.0/16
acl docker_compose src 172.18.0.0/16
acl docker_desktop src 192.168.65.0/24

# localhost
acl localnet src 127.0.0.0/8
acl localnet src ::1

# SSL 포트 (HTTPS CONNECT 허용)
acl SSL_ports port 443
acl Safe_ports port 80
acl Safe_ports port 443
acl Safe_ports port 8080-8090
acl CONNECT method CONNECT

# --- 접근 제어 ---
# 안전하지 않은 포트 차단
http_access deny !Safe_ports
http_access deny CONNECT !SSL_ports

# Docker 네트워크에서 오는 요청 허용
http_access allow docker_bridge
http_access allow docker_compose
http_access allow docker_desktop
http_access allow localnet

# 나머지 차단
http_access deny all

# --- 로깅 ---
# macOS brew: /opt/homebrew/var/log/squid/, Linux: /var/log/squid/
access_log stdio:/opt/homebrew/var/log/squid/access.log
cache_log /opt/homebrew/var/log/squid/cache.log

# --- 성능 ---
cache_mem 64 MB
maximum_object_size 10 MB

# --- 보안 ---
# EC API가 X-Forwarded-For의 IP로 화이트리스트 체크하므로 제거
via off
forwarded_for delete

# --- 타임아웃 ---
connect_timeout 30 seconds
read_timeout 60 seconds
request_timeout 60 seconds

# --- PID ---
# macOS brew: /opt/homebrew/var/run/, Linux: /var/run/squid/
pid_filename /opt/homebrew/var/run/squid.pid
